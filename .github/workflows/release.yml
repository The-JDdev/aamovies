name: Build & Release AAMovies v7.0

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v7.0)'
        required: true
        default: 'v7.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > aamovies.keystore
          ls -lh aamovies.keystore

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all ABI-split release APKs
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"
        run: |
          ./gradlew assembleRelease --max-workers 2 --no-daemon

      - name: Collect APKs
        run: |
          mkdir -p release-apks
          for flavor in armeabi_v7a arm64_v8a x86 x86_64 universal apkpure; do
            src="app/build/outputs/apk/${flavor}/release/app-${flavor}-release.apk"
            if [ -f "$src" ]; then
              label=$(echo $flavor | sed 's/armeabi_v7a/armeabi-v7a/; s/arm64_v8a/arm64-v8a/; s/x86_64/x86-64/')
              cp "$src" "release-apks/AAMovies-${{ github.event.inputs.tag }}-${label}.apk"
              echo "Collected: release-apks/AAMovies-${{ github.event.inputs.tag }}-${label}.apk"
            else
              echo "WARNING: $src not found"
            fi
          done
          ls -lh release-apks/

      - name: Delete old release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ github.event.inputs.tag }}" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/${{ github.event.inputs.tag }}" 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.tag }}" \
            --title "AAMovies ${{ github.event.inputs.tag }}" \
            --notes "## AAMovies ${{ github.event.inputs.tag }}

          ### What's New in v7.0
          - LIFO trending/pinned ordering
          - 32-item pagination with numbered page buttons
          - Blue poster borders + 4-corner overlay tags
          - Hamburger drawer navigation
          - 5-tab bottom navigation (Home, Search, Trending, Watchlist, Profile)
          - Redesigned Movie Detail screen (banner + poster overlay + cast chips + screenshot grid + social buttons)
          - Security: ProGuard + root/emulator/signature checks

          ### Download
          Pick the APK matching your device:
          - **arm64-v8a** — most modern Android devices (recommended)
          - **armeabi-v7a** — older 32-bit Android devices
          - **x86** — emulators / Intel 32-bit
          - **x86-64** — Intel 64-bit devices
          - **universal** — works on all architectures (larger file)
          - **apkpure** — APKPure distribution (universal)" \
            release-apks/*.apk
